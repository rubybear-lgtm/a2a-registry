name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: TypeScript Type Check
        run: npm run types:check

      - name: PHP Lint (Pint)
        run: vendor/bin/pint --test

      - name: Validate OpenAPI Spec
        run: php -r "json_decode(file_get_contents('sdk/openapi/a2a-registry.v1.json'), true, 512, JSON_THROW_ON_ERROR); echo 'OK';"

      - name: Build npm SDK
        run: npx -p typescript tsc -p sdk/npm/tsconfig.json

      - name: Tests
        run: ./vendor/bin/pest
